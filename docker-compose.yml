networks:
  dto-red:
    ipam:
      driver: default
      config:
        - subnet: "192.168.0.0/24"
          

services:
  db:
    image: mysql:latest
    container_name: base_datos
    environment:
      MYSQL_DATABASE: hospital
      #- MYSQL_ROOT_PASSWORD=db_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
      
    ports:
      - 3307:3306
    volumes:
      - ./mysql:/var/lib/mysql
      - ./db_dump:/docker-entrypoint-initdb.d
    networks:
      dto-red:
        ipv4_address: "192.168.0.10"
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    links:
      - db
    depends_on:
      - db
    ports:
      - 8080:80
    environment:
      - PMA_HOST=192.168.0.10
      - PMA_PORT=3306
    networks:
      dto-red:
        ipv4_address: "192.168.0.11"

  
  webdatos:
    container_name: web_datos
    build:
      context: ./pydatos
      dockerfile: Dockerfile
    volumes:
      - ./pydatos/app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "80", "--reload"]
    ports:
      - 8000:80
    depends_on:
      - db
    networks:
      dto-red:
        ipv4_address: "192.168.0.12"

  webnegocio:
    container_name: web_negocio
    build:
      context: ./pynegocio
      dockerfile: Dockerfile
    volumes:
      - ./pynegocio/app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "80", "--reload"]
    ports:
      - 9000:80
    depends_on:
      - webdatos
    networks:
      dto-red:
        ipv4_address: "192.168.0.13"

  webpresentacion:
    container_name: web_presentacion
    build:
      context: ./presentacion
      dockerfile: Dockerfile
    ports:
      - 4201:80  # Cambiar a puerto 4201
    depends_on:
      - webnegocio
    networks:
      dto-red:
        ipv4_address: "192.168.0.14"
    environment:
      - API_URL=http://192.168.0.13:80

secrets:
  db_password:
    file: ./db_password.txt
    

volumes:
  db_dump:
  mysql:
  datos:
  webdatos:
  webnegocio:
  webpresentacion:
